<!doctype html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/jpeg" href="/logo.jpg" />
    <link rel="apple-touch-icon" href="/logo.jpg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" id="theme-color-meta" content="#121212" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="description" content="Darren Pinto's personal portfolio. Undergraduate student and robotics researcher at Carnegie Mellon University building intelligent systems." />
    <link rel="preconnect" href="https://cloud.umami.is" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700&display=swap" rel="stylesheet" />
    <title>Darren Pinto</title>
    <meta name="keywords"
        content="Darren Pinto, Carnegie Mellon University, CMU, Robotics, Engineering, Computer Engineering, Portfolio, Embedded Systems, Reinforcement Learning" />
    <meta name="author" content="Darren Pinto" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://darrenpinto.me/" />
    <meta property="og:title" content="Darren Pinto | Robotics Researcher & Engineer" />
    <meta property="og:description"
        content="Darren Pinto's Personal Portfolio. Undergraduate Student & Robotics Researcher at Carnegie Mellon University." />
    <meta property="og:image" content="https://darrenpinto.me/preview.png" />
    <meta property="og:site_name" content="Darren Pinto" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://darrenpinto.me/" />
    <meta property="twitter:title" content="Darren Pinto | Robotics Researcher & Engineer" />
    <meta property="twitter:description"
        content="Darren Pinto's Personal Portfolio. Undergraduate Student & Robotics Researcher at Carnegie Mellon University." />
    <meta property="twitter:image" content="https://darrenpinto.me/preview.png" />

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "Darren Pinto",
        "url": "https://darrenpinto.me/",
        "description": "Darren Pinto's Personal Portfolio. Undergraduate Student & Robotics Researcher at Carnegie Mellon University.",
        "author": {
          "@type": "Person",
          "name": "Darren Pinto",
          "url": "https://darrenpinto.me/"
        },
        "image": "https://darrenpinto.me/preview.png"
      }
    </script>
    <script>
        // Apply theme immediately before React loads
        (function () {
            var saved = null;
            try {
                saved = localStorage.getItem('theme');
            } catch (err) {
                saved = null;
            }
            var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
            var theme = saved || (prefersDark ? 'dark' : 'light');
            document.documentElement.setAttribute('data-theme', theme);
            var meta = document.getElementById('theme-color-meta');
            if (meta) meta.setAttribute('content', theme === 'dark' ? '#121212' : '#ffffff');
        })();
    </script>
</head>

<body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
</body>

</html>
